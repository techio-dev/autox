name: Build PhoneFarm APK
on:
  workflow_dispatch: # Manual branch selection

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Set variables
      - name: Set output
        id: vars
        run: |
          echo "short_ref=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Checkout code
        id: check
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Template APP
        run: |
          chmod 777 ./gradlew
          ./gradlew phonefarm:buildTemplateApp

      - name: Build PhoneFarm App
        run: |
          ./gradlew phonefarm:assembleRelease

      - name: Sign APP
        uses: Tlaster/android-sign@v1.2.2
        with:
          releaseDirectory: |
            phonefarm/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          output: build/app/signed
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          cd build/app/signed
          mv phonefarm-arm64-v8a-*.apk PhoneFarm-arm64-v8a-release-${{steps.vars.outputs.short_ref}}.apk
          mv phonefarm-armeabi-v7a-*.apk PhoneFarm-armeabi-v7a-release-${{steps.vars.outputs.short_ref}}.apk
          mv phonefarm-universal-*.apk PhoneFarm-universal-release-${{steps.vars.outputs.short_ref}}.apk
          ls

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: |
            [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{steps.vars.outputs.short_ref}}/CHANGELOG.md)
          # Match all files in directory
          files: "build/app/signed/**"
          draft: true # Draft
