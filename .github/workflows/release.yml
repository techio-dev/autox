name: build ltt apk
on:
  workflow_dispatch: # 手动选择分支

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set output
        id: vars
        run: |
          echo "short_ref=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Checkout code
        id: check
        uses: actions/checkout@v4

      - name: Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: release LTT App
        run: |
          chmod 777 ./gradlew
          ./gradlew ltt:assembleRelease
          echo "=== Build completed, checking outputs ==="
          find . -name "*.apk" -type f | head -10

      - name: Sign APK
        uses: Tlaster/android-sign@v1.2.2
        with:
          releaseDirectory: |
            ltt/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          output: build/ltt/signed
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Debug - Check signed files
        run: |
          echo "=== Checking current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== Checking if build/ltt/signed directory exists ==="
          if [ -d "build/ltt/signed" ]; then
            echo "Directory exists, listing contents:"
            ls -la build/ltt/signed/
          else
            echo "Directory build/ltt/signed does not exist"
          fi
          echo ""
          echo "=== Finding all APK files recursively ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Checking android-sign output directory structure ==="
          find . -type d -name "*ltt*" -o -name "*signed*" -o -name "*build*" 2>/dev/null || echo "No matching directories found"

      - name: Rename APK
        run: |
          echo "=== Before rename - checking available files ==="
          find . -name "*.apk" -type f
          echo ""

          # Try to find the correct directory and file
          if [ -d "build/ltt/signed" ] && [ "$(find build/ltt/signed -name "*.apk" | wc -l)" -gt 0 ]; then
            echo "Found APK files in build/ltt/signed:"
            ls -la build/ltt/signed/
            cd build/ltt/signed
            
            # Ưu tiên Universal APK trước
            if [ "$(find . -name "*universal*.apk" | wc -l)" -gt 0 ]; then
              echo "Found Universal APK, using it..."
              mv *universal*.apk ltt-release-${{steps.vars.outputs.short_ref}}.apk
            elif [ "$(find . -name "*arm64*.apk" | wc -l)" -gt 0 ]; then
              echo "Found ARM64 APK, using it..."
              mv *arm64*.apk ltt-release-${{steps.vars.outputs.short_ref}}.apk
            else
              echo "Using first available APK..."
              mv ltt-release-*.apk ltt-release-${{steps.vars.outputs.short_ref}}.apk
            fi
          elif [ "$(find . -maxdepth 1 -name "*ltt-release*.apk" | wc -l)" -gt 0 ]; then
            echo "Found APK files in current directory:"
            ls -la *ltt-release*.apk
            
            # Ưu tiên Universal APK
            if [ "$(find . -maxdepth 1 -name "*universal*.apk" | wc -l)" -gt 0 ]; then
              echo "Found Universal APK in root, using it..."
              mv *universal*.apk ltt-release-${{steps.vars.outputs.short_ref}}.apk
            else
              mv *ltt-release*.apk ltt-release-${{steps.vars.outputs.short_ref}}.apk
            fi
          else
            echo "ERROR: Cannot find APK files to rename"
            echo "Available files in current directory:"
            ls -la
            exit 1
          fi

          echo "=== After rename ==="
          find . -name "*.apk" -type f

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: |
            [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{steps.vars.outputs.short_ref}}/CHANGELOG.md)
          files: "build/ltt/signed/**"
          draft: true # 草稿
